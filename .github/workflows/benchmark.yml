name: Benchmark

on:
  push:
    branches: [master, main]
    paths:
      - 'packages/timesfm-core/src/**'
      - 'packages/timesfm-core/package.json'
      - 'scripts/benchmark-ci.js'
      - 'scripts/export-onnx.py'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: benchmark-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Benchmark
  # ═══════════════════════════════════════════════════════════════════════════
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm install --frozen-lockfile
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm build

      # ── Cache ONNX model ─────────────────────────────────────────────────
      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py') }}-v2

      - name: Export TimesFM ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
        timeout-minutes: 15

      # ── Run benchmark with structured output ────────────────────────────
      - name: Run benchmark
        id: bench
        run: |
          NODE_PATH=$(find node_modules/.pnpm -maxdepth 2 -path "*/onnxruntime-node@*/node_modules" -type d 2>/dev/null | head -1):$NODE_PATH \
          node scripts/benchmark-ci.js --all benchmark-report.json benchmark-report.md
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          BENCH_ITERATIONS: 10
        timeout-minutes: 10

      # ── Publish benchmark report to GitHub Pages ────────────────────────
      - name: Prepare pages artifact
        run: |
          mkdir -p gh-pages/benchmark

          # JSON report (for programmatic access)
          cp benchmark-report.json gh-pages/benchmark/benchmark-report.json

          # Markdown report
          cp benchmark-report.md gh-pages/benchmark/benchmark-report.md

          # HTML index
          echo '<!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><meta http-equiv="refresh" content="0;url=benchmark-report.html">
          <title>TimesFM Benchmark</title></head>
          <body><p>Redirecting to <a href="benchmark-report.html">benchmark report</a>…</p></body>
          </html>' > gh-pages/benchmark/index.html

          # Convert markdown to basic HTML (GitHub Pages renders .md natively)
          # Include a JSON data block for programmatic consumers
          JSON_DATA=$(cat benchmark-report.json)
          echo '<!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><title>TimesFM Benchmark Report</title>
          <style>body{font-family:system-ui,sans-serif;max-width:960px;margin:2rem auto;padding:0 1rem;line-height:1.6;color:#1a1a2e}
          h1{border-bottom:3px solid #2563eb;padding-bottom:.5rem}
          h2{margin-top:2rem;color:#1e40af}
          table{border-collapse:collapse;width:100%;margin:1rem 0}
          th,td{border:1px solid #ddd;padding:8px 12px;text-align:left}
          th{background:#f5f5f5;font-weight:600}
          tr:hover{background:#f8fafc}
          .pass{color:#16a34a;font-weight:600}
          .meta{color:#6b7280;font-size:.9rem}
          pre{background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:6px;overflow-x:auto}
          </style></head>
          <body>
          <h1>📊 TimesFM 2.5 200M Benchmark Report</h1>
          <p class="meta">'$(node -e "const r=require('./benchmark-report.json');console.log('Generated: '+r.timestamp+' · Git: '+r.git_sha+' · '+r.cpu_model+' × '+r.cpu_cores)")'</p>
          <h2>Inference Latency</h2>
          <table>
          <tr><th>Context</th><th>Patches</th><th>Avg (ms)</th><th>P50 (ms)</th><th>P99 (ms)</th><th>Throughput (seq/s)</th></tr>
          '$(node -e "const r=require('./benchmark-report.json');r.latency.forEach(l=>console.log('<tr><td>'+l.context+'</td><td>'+l.patches+'</td><td>'+l.avg_ms+'</td><td>'+l.p50_ms+'</td><td>'+l.p99_ms+'</td><td>'+l.throughput_seq_s+'</td></tr>'))")'
          </table>
          <h2>Memory</h2>
          <table>
          <tr><th>Metric</th><th>Value</th></tr>'$(node -e "const r=require('./benchmark-report.json');console.log('<tr><td>RSS</td><td>'+r.memory.rss_mb+' MB</td></tr><tr><td>Heap Used</td><td>'+r.memory.heap_used_mb+' MB</td></tr>')")'
          </table>
          '$(node -e "const r=require('./benchmark-report.json');if(r.accuracy)console.log('<h2>Prediction Accuracy (full TimesFM pipeline)</h2><p class=meta>Complete pipeline: RevIN normalization + flip invariance + continuous quantile head</p><table><tr><th>Metric</th><th>Value</th></tr><tr><td>Naive MAE (no-change)</td><td>'+r.accuracy.naive_mae+'</td></tr><tr><td>Constant Mean MAE</td><td>'+r.accuracy.const_mae+'</td></tr><tr><td><b>TimesFM MAE</b></td><td><b>'+r.accuracy.model_mae+'</b></td></tr><tr><td>TimesFM RMSE</td><td>'+r.accuracy.model_rmse+'</td></tr><tr><td>Scaled MAE vs Naive</td><td>'+r.accuracy.scaled_mae+' '+(r.accuracy.better_than_naive?'<span class=pass>✅ Better</span>':'⚠️')+'</td></tr><tr><td>Improvement vs Naive</td><td><b>'+r.accuracy.improvement_vs_naive_pct+'%</b></td></tr><tr><td>Improvement vs Const Mean</td><td><b>'+r.accuracy.improvement_vs_const_pct+'%</b></td></tr></table>')")'
          <p><a href="benchmark-report.json">View raw JSON data</a> · <a href="benchmark-report.md">View Markdown version</a></p>
          </body></html>' > gh-pages/benchmark/benchmark-report.html

      - name: Upload benchmark report artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: gh-pages/
          retention-days: 30

      - name: Benchmark summary
        run: |
          echo "### 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY
