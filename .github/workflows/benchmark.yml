name: Benchmark

on:
  push:
    branches: [master, main]
    paths:
      - 'packages/timesfm-core/src/**'
      - 'packages/timesfm-core/package.json'
      - 'scripts/benchmark-ci.js'
      - 'scripts/export-onnx.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Benchmark
  # ═══════════════════════════════════════════════════════════════════════════
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm install --frozen-lockfile
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm build

      # ── Cache ONNX model ─────────────────────────────────────────────────
      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3

      - name: Export TimesFM ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
        timeout-minutes: 15

      # ── Run benchmark with structured output ────────────────────────────
      - name: Run benchmark
        id: bench
        run: |
          pnpm exec tsx scripts/benchmark-ci.js \
            --all benchmark-report.json benchmark-report.md \
            --html benchmark-report.html
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          BENCH_ITERATIONS: 10
        timeout-minutes: 10

      # ── Publish benchmark report to GitHub Pages ────────────────────────
      - name: Prepare pages artifact
        run: |
          mkdir -p gh-pages/benchmark

          # JSON report (for programmatic access)
          cp benchmark-report.json gh-pages/benchmark/benchmark-report.json

          # Markdown report
          cp benchmark-report.md gh-pages/benchmark/benchmark-report.md

          # HTML report (generated by benchmark-ci.js, no shell heredoc needed)
          cp benchmark-report.html gh-pages/benchmark/benchmark-report.html

          # HTML index (redirect)
          echo '<!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><meta http-equiv="refresh" content="0;url=benchmark-report.html">
          <title>TimesFM Benchmark</title></head>
          <body><p>Redirecting to <a href="benchmark-report.html">benchmark report</a>…</p></body>
          </html>' > gh-pages/benchmark/index.html

      - name: Upload benchmark report artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: gh-pages/benchmark/
          retention-days: 30

      - name: Benchmark summary
        run: |
          echo "### 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Batch | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+(l.batch_size||1)+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY

      # ── Performance Regression Check ──────────────────────────────────
      - name: Performance Regression Check
        run: |
          # Download baseline from GitHub Pages (latest published benchmark)
          echo "📥 Fetching baseline from GitHub Pages..."
          curl -sSf https://agentix-e.github.io/agentix-timesfm-ts/benchmark/benchmark-report.json \
            -o baseline.json 2>/dev/null || true

          if [ -s baseline.json ]; then
            echo "✅ Baseline loaded, running regression check..."
            pnpm exec tsx scripts/benchmark-ci.js \
              --check-regression \
              --current benchmark-report.json \
              --baseline baseline.json \
              --regression-threshold 10 \
              2>&1 | tee regression-output.txt
            REGRESSION_EXIT=$?

            # Check for critical regressions
            if grep -q "CRITICAL" regression-output.txt 2>/dev/null; then
              echo "::warning::⚠️ Critical performance regression detected! Review benchmark report."
            elif grep -q "WARNING" regression-output.txt 2>/dev/null; then
              echo "::warning::⚠️ Performance regression >10% detected on some data points."
            elif grep -q "regression" regression-output.txt 2>/dev/null; then
              echo "✅ No significant performance regression detected."
            fi
          else
            echo "ℹ️ No baseline available yet — skipping regression check (first run?)"
          fi
        continue-on-error: true
