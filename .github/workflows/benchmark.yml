name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6 AM UTC

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Node.js Benchmark (native ONNX Runtime)
  # ═══════════════════════════════════════════════════════════════════════
  node-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3

      - name: Export TimesFM ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
        timeout-minutes: 15

      - name: Run Node.js benchmark
        run: |
          pnpm exec tsx scripts/benchmark-ci.js \
            --json benchmark-report.json \
            --md benchmark-report.md \
            --html benchmark-report.html
        timeout-minutes: 10
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          BENCH_ITERATIONS: 10

      - name: Benchmark summary
        run: |
          echo "### 📊 Node.js Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Batch | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+(l.batch_size||1)+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY

      - name: Accuracy Gate
        run: |
          node -e "
          const r = require('./benchmark-report.json');
          if (!r.accuracy) { console.log('No accuracy data — skipping gate.'); process.exit(0); }
          if (r.accuracy.scaled_mae >= 1.0) {
            console.error('FAIL: TimesFM scaled MAE (' + r.accuracy.scaled_mae + ') is not better than naive baseline.');
            console.error('  Model MAE: ' + r.accuracy.model_mae + ' vs Naive MAE: ' + r.accuracy.naive_mae);
            process.exit(1);
          }
          console.log('PASS: TimesFM scaled MAE = ' + r.accuracy.scaled_mae + ' (< 1.0, better than naive)');
          console.log('  Improvement vs Naive: ' + r.accuracy.improvement_vs_naive_pct + '%');
          "

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════
  # WASM Benchmark
  # ═══════════════════════════════════════════════════════════════════════
  wasm-benchmark:
    needs: [node-benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3

      - name: Export TimesFM ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
        timeout-minutes: 15

      - name: Run WASM benchmark
        run: |
          pnpm exec tsx scripts/web-benchmark-ci.js \
            --json web-benchmark-report.json \
            --md web-benchmark-report.md \
            --html web-benchmark-report.html
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          WEB_BENCH_ITERATIONS: 10
        timeout-minutes: 10

      - name: WASM benchmark summary
        run: |
          echo "### 🌐 WASM Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./web-benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY

      - name: Upload WASM benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-benchmark-report
          path: |
            web-benchmark-report.json
            web-benchmark-report.md
            web-benchmark-report.html
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════
  # Deploy to GitHub Pages
  # ═══════════════════════════════════════════════════════════════════════
  deploy-benchmark-pages:
    needs: [node-benchmark, wasm-benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Generate API documentation
        run: pnpm docs:generate

      - name: Download benchmark report
        uses: actions/download-artifact@v4
        with:
          name: benchmark-report
          path: docs/benchmark

      - name: Download WASM benchmark report
        uses: actions/download-artifact@v4
        with:
          name: web-benchmark-report
          path: docs/web-benchmark

      - name: Generate combined benchmark report
        run: |
          if [ -f docs/benchmark/benchmark-report.json ] && [ -f docs/web-benchmark/web-benchmark-report.json ]; then
            node scripts/generate-combined-report.js \
              --node docs/benchmark/benchmark-report.json \
              --web docs/web-benchmark/web-benchmark-report.json \
              --out docs/benchmark/index.html
            echo "[deploy-benchmark-pages] Combined benchmark report generated"
          else
            echo "[deploy-benchmark-pages] Skipping combined benchmark (missing benchmark data)"
            # Create a placeholder combined report
            node -e "
              const fs = require('fs');
              const html = '<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>Benchmark Pending</title></head><body><h1>Benchmark Report Pending</h1><p>Check back after the next CI run.</p></body></html>';
              fs.mkdirSync('docs/benchmark', { recursive: true });
              fs.writeFileSync('docs/benchmark/index.html', html);
            "
          fi

      - name: Prepare pages
        run: node scripts/prepare-pages.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
