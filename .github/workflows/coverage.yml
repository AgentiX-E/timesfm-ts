name: Coverage Report

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: coverage-pages
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Coverage
  # ═══════════════════════════════════════════════════════════════════════════
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm install --frozen-lockfile
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm build

      # ── Cache ONNX model ─────────────────────────────────────────────────
      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py') }}-v2

      - name: Export TimesFM ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
        timeout-minutes: 15

      # ── Full test suite with real ONNX model ────────────────────────────
      - name: Run full tests with real model
        run: pnpm test
        timeout-minutes: 10

      # ── Coverage ────────────────────────────────────────────────────────
      - name: Run coverage
        run: pnpm test:coverage
        timeout-minutes: 10

      # ── Publish coverage to GitHub Pages ────────────────────────────────
      - name: Prepare coverage pages
        run: |
          mkdir -p gh-pages/coverage

          if [ -d coverage ]; then
            cp -r coverage/* gh-pages/coverage/ 2>/dev/null || true
          fi

          # Ensure index.html exists
          if [ ! -f gh-pages/coverage/index.html ]; then
            # Generate a summary page from lcov or json report
            echo '<!DOCTYPE html>
            <html lang="en">
            <head><meta charset="UTF-8"><title>Coverage Report · TimesFM</title>
            <style>body{font-family:system-ui,sans-serif;max-width:960px;margin:2rem auto;padding:0 1rem;line-height:1.6;color:#1a1a2e}
            h1{border-bottom:3px solid #2563eb;padding-bottom:.5rem}
            table{border-collapse:collapse;width:100%;margin:1rem 0}
            th,td{border:1px solid #ddd;padding:8px 12px}
            th{background:#f5f5f5;text-align:left}
            .pass{color:#16a34a;font-weight:600}
            </style></head>
            <body>
            <h1>📈 Coverage Report</h1>
            <p>Full HTML coverage report with line-by-line annotations is available in the <code>lcov-report/</code> directory.</p>
            <p><a href="lcov-report/index.html">View detailed LCOV report →</a></p>
            </body></html>' > gh-pages/coverage/index.html
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: gh-pages/
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          echo "### 📈 Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View coverage artifact](https://github.com/AgentiX-E/agentix-timesfm-ts/actions)" >> $GITHUB_STEP_SUMMARY
