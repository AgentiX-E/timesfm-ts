name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ─── Lint & Format ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  # ─── Unit Tests (no model required — fast feedback) ────────────────────
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm build
      - run: pnpm vitest run --config vitest.unit.config.ts

  # ─── Build check (TypeScript compile) ──────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm build

  # ─── Integration Tests (requires ONNX model) ──────────────────────────
  integration-test:
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm install --frozen-lockfile
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm build

      # Cache ONNX model to avoid repeated 885 MB download
      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3

      # Export test model from HuggingFace (requires Python + PyTorch)
      - name: Export TimesFM ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
        timeout-minutes: 15

      - run: pnpm test
      - run: pnpm test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Benchmark ─────────────────────────────────────────────────────────
  benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm build

      # Restore cached model from integration-test cache key
      - name: Restore cached ONNX model
        uses: actions/cache/restore@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3
          fail-on-cache-miss: true

      - name: Run benchmark (structured report)
        run: |
          pnpm exec tsx scripts/benchmark-ci.js \
            --all benchmark-report.json benchmark-report.md \
            --html benchmark-report.html
        timeout-minutes: 10
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          BENCH_ITERATIONS: 10

      - name: Benchmark summary
        run: |
          echo "### 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Batch | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+(l.batch_size||1)+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  # ─── Web (WASM) Benchmark — parallel with Node benchmark ───────────────
  web-benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm build

      # Restore cached model (same key as integration-test and benchmark)
      - name: Restore cached ONNX model
        uses: actions/cache/restore@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3
          fail-on-cache-miss: true

      # ── Web Integration Tests (real model + onnxruntime-web WASM) ─────────
      - name: Web Integration Tests
        run: |
          echo "🧪 Running web integration tests with real ONNX model..."
          pnpm --filter @agentix-e/timesfm-web exec vitest run \
            test/web-integration.test.ts \
            --reporter=verbose
        env:
          TIMESFM_WEB_TEST_MODEL: models/timesfm-2.5.onnx
          TIMESFM_TEST_MODEL: models/timesfm-2.5.onnx
        timeout-minutes: 10

      # ── Web Benchmark (WASM) ──────────────────────────────────────────────
      - name: Run web benchmark (WASM)
        run: |
          pnpm exec tsx scripts/web-benchmark-ci.js \
            --all web-benchmark-report.json web-benchmark-report.md \
            --html web-benchmark-report.html
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          WEB_BENCH_ITERATIONS: 10
        timeout-minutes: 10

      - name: Web benchmark summary
        run: |
          echo "### 🌐 Web (WASM) Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./web-benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY

      - name: Upload web benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-benchmark-report
          path: |
            web-benchmark-report.json
            web-benchmark-report.md
            web-benchmark-report.html
          retention-days: 7
