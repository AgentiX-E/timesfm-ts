name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly benchmark on Monday at 6 AM UTC

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Lint & Format ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  # ─── Unit Tests (no model required — fast feedback) ────────────────────
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm vitest run --config vitest.unit.config.ts --coverage
      - name: Verify unit coverage data
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "FAIL: coverage/coverage-summary.json not generated. Vitest coverage step may have silently failed."
            exit 1
          fi
          node -e "
          const fs = require('fs');
          const s = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')).total;
          if (!s || !s.lines || s.lines.pct === 0) {
            console.error('FAIL: No meaningful coverage data. All metrics are 0%.');
            process.exit(1);
          }
          const thresholds = { lines: 95, branches: 95, functions: 95, statements: 95 };
          for (const [k, t] of Object.entries(thresholds)) {
            const pct = s[k].pct;
            const status = pct >= t ? '✅' : '❌';
            console.log(status + ' unit ' + k + ': ' + pct.toFixed(1) + '% (threshold: ' + t + '%)');
          }
          console.log('✅ coverage-summary.json present with valid data');
          console.log('   (vitest config.thresholds enforces these gates automatically)');
          "

  # ─── Build check (TypeScript compile) ──────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ─── Integration Tests (requires ONNX model) ──────────────────────────
  integration-test:
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3

      - name: Export TimesFM ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
        timeout-minutes: 15

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Verify integration coverage data
        run: |
          node -e "
          const fs = require('fs');
          if (!fs.existsSync('coverage/coverage-summary.json')) {
            console.error('FAIL: coverage-summary.json not found. Integration tests may have failed silently.');
            process.exit(1);
          }
          const s = require('./coverage/coverage-summary.json').total;
          if (!s || !s.lines || s.lines.pct === 0) {
            console.error('FAIL: No meaningful coverage data. All metrics are 0%.');
            process.exit(1);
          }
          console.log('✅ coverage-summary.json present with valid data');
          console.log('   lines: ' + s.lines.pct.toFixed(1) + '%  branches: ' + s.branches.pct.toFixed(1) + '%  functions: ' + s.functions.pct.toFixed(1) + '%  statements: ' + s.statements.pct.toFixed(1) + '%');
          console.log('   (vitest config.thresholds enforces ≥95% gates automatically)');
          "

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 7

  # ─── Node.js Benchmark ────────────────────────────────────────────────
  benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3
          fail-on-cache-miss: true

      - name: Run benchmark
        run: |
          pnpm exec tsx scripts/benchmark-ci.js \
            --json benchmark-report.json \
            --md benchmark-report.md \
            --html benchmark-report.html
        timeout-minutes: 10
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          BENCH_ITERATIONS: 10

      - name: Benchmark summary
        run: |
          echo "### 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Batch | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+(l.batch_size||1)+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY

      - name: Accuracy Gate
        run: |
          node -e "
          const r = require('./benchmark-report.json');
          if (!r.accuracy) { console.log('No accuracy data — skipping gate.'); process.exit(0); }
          if (r.accuracy.scaled_mae >= 1.0) {
            console.error('FAIL: TimesFM scaled MAE (' + r.accuracy.scaled_mae + ') is not better than naive baseline.');
            console.error('  Model MAE: ' + r.accuracy.model_mae + ' vs Naive MAE: ' + r.accuracy.naive_mae);
            process.exit(1);
          }
          console.log('PASS: TimesFM scaled MAE = ' + r.accuracy.scaled_mae + ' (< 1.0, better than naive)');
          console.log('  Improvement vs Naive: ' + r.accuracy.improvement_vs_naive_pct + '%');
          "

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  # ─── Web (WASM) Benchmark — parallel with Node benchmark ───────────────
  web-benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v4
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3
          fail-on-cache-miss: true

      - name: Run web benchmark (WASM)
        # The benchmark script itself exercises the WASM engine with the real
        # ONNX model — no separate integration test step is needed.
        run: |
          pnpm exec tsx scripts/web-benchmark-ci.js \
            --json web-benchmark-report.json \
            --md web-benchmark-report.md \
            --html web-benchmark-report.html
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          WEB_BENCH_ITERATIONS: 10
        timeout-minutes: 10

      - name: Web benchmark summary
        run: |
          echo "### 🌐 Web (WASM) Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./web-benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY

      - name: Upload web benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-benchmark-report
          path: |
            web-benchmark-report.json
            web-benchmark-report.md
            web-benchmark-report.html
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # GitHub Pages — delegates to shared reusable workflow
  # ═══════════════════════════════════════════════════════════════════════
  deploy-pages:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: [lint, unit-test, build, integration-test, benchmark, web-benchmark]
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/_deploy-pages.yml
    with:
      artifact-run-id: ${{ github.run_id }}
