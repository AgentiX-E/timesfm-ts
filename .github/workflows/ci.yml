name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly benchmark on Monday at 6 AM UTC

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Lint & Format ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  # ─── Unit Tests (no model required — fast feedback) ────────────────────
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm vitest run --config vitest.unit.config.ts --coverage
      - name: Generate coverage summary for CI
        if: always()
        run: |
          mkdir -p coverage
          if [ ! -f coverage/coverage-summary.json ]; then
            echo '{"total":{"lines":{"pct":0},"branches":{"pct":0},"functions":{"pct":0},"statements":{"pct":0}}}' > coverage/coverage-summary.json
          fi
      - name: Report unit coverage
        if: always()
        run: node scripts/ci-coverage-check.js --tier unit --verbose

  # ─── Build check (TypeScript compile) ──────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ─── Integration Tests (requires ONNX model) ──────────────────────────
  integration-test:
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3

      - name: Export TimesFM ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
        timeout-minutes: 15

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Verify integration coverage
        run: node scripts/ci-coverage-check.js --tier integration --verbose

      - name: Ensure coverage directory exists
        if: always()
        run: |
          mkdir -p coverage
          if [ ! -f coverage/coverage-summary.json ]; then
            echo '{"total":{"lines":{"pct":0},"branches":{"pct":0},"functions":{"pct":0},"statements":{"pct":0}}}' > coverage/coverage-summary.json
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Node.js Benchmark ────────────────────────────────────────────────
  benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3
          fail-on-cache-miss: true

      - name: Run benchmark
        run: |
          pnpm exec tsx scripts/benchmark-ci.js \
            --json benchmark-report.json \
            --md benchmark-report.md \
            --html benchmark-report.html
        timeout-minutes: 10
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          BENCH_ITERATIONS: 10

      - name: Benchmark summary
        run: |
          echo "### 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Batch | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+(l.batch_size||1)+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY

      - name: Accuracy Gate
        run: node scripts/ci-benchmark-check.js --verbose

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  # ─── Web (WASM) Benchmark — parallel with Node benchmark ───────────────
  web-benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v3
          fail-on-cache-miss: true

      - name: Run web benchmark (WASM)
        # The benchmark script itself exercises the WASM engine with the real
        # ONNX model — no separate integration test step is needed.
        run: |
          pnpm exec tsx scripts/web-benchmark-ci.js \
            --json web-benchmark-report.json \
            --md web-benchmark-report.md \
            --html web-benchmark-report.html
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          WEB_BENCH_ITERATIONS: 10
        timeout-minutes: 10

      - name: Web benchmark summary
        run: |
          echo "### 🌐 Web (WASM) Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Context | Avg Latency (ms) | Throughput (seq/s) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          node -e "const r=require('./web-benchmark-report.json');r.latency.forEach(l=>console.log('| '+l.context+' | '+l.avg_ms+' | '+l.throughput_seq_s+' |'))" >> $GITHUB_STEP_SUMMARY

      - name: Upload web benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-benchmark-report
          path: |
            web-benchmark-report.json
            web-benchmark-report.md
            web-benchmark-report.html
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # GitHub Pages — publish API docs + coverage on push to master
  # API docs and coverage deploy on every push regardless of benchmark
  # status. Benchmark data is included opportunistically if the jobs
  # completed — otherwise the combined report is simply skipped.
  # ═══════════════════════════════════════════════════════════════════════
  deploy-pages:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'schedule')
    needs: [lint, unit-test, build, integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # ── Generate TypeDoc API docs ──────────────────────────────────────
      - name: Generate API documentation
        run: pnpm docs:generate

      # ── Download artifacts from this workflow run ──────────────────────
      # Benchmark artifacts are downloaded opportunistically — the jobs
      # may have been skipped or failed.  continue-on-error ensures
      # that missing artifacts do not block the docs+coverage deployment.
      - name: Download benchmark report
        uses: actions/download-artifact@v8
        with:
          name: benchmark-report
          path: docs/benchmark
        continue-on-error: true

      - name: Download web benchmark report
        uses: actions/download-artifact@v8
        with:
          name: web-benchmark-report
          path: docs/web-benchmark
        continue-on-error: true

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: docs/coverage
        continue-on-error: true

      # ── Build combined benchmark report (Node + WASM comparison) ────
      - name: Generate combined benchmark report
        run: |
          if [ -f docs/benchmark/benchmark-report.json ] && [ -f docs/web-benchmark/web-benchmark-report.json ]; then
            node scripts/generate-combined-report.js \
              --node docs/benchmark/benchmark-report.json \
              --web docs/web-benchmark/web-benchmark-report.json \
              --out docs/benchmark/index.html
            echo "[deploy-pages] Combined benchmark report generated"
          else
            echo "[deploy-pages] Skipping combined benchmark (missing benchmark data)"
          fi

      # ── Build coverage dashboard + root landing page ────
      - name: Prepare pages
        run: node scripts/prepare-pages.js

      # ── Deploy to GitHub Pages ────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
