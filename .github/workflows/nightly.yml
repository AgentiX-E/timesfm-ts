name: Nightly Model Check

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compare HF revision vs committed descriptor
        id: version-check
        run: |
          if python3 scripts/export-onnx.py --check-latest --diff; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new HF revision detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            SHA=$(python3 -c "import urllib.request,json;r=urllib.request.urlopen('https://huggingface.co/api/models/google/timesfm-2.5-200m-pytorch',timeout=10);print(json.loads(r.read())['sha'][:12])")
            echo "sha=${SHA}" >> $GITHUB_OUTPUT
            echo "New HF revision detected: ${SHA}"
          fi

      - name: Trigger model release
        if: steps.version-check.outputs.changed == 'true'
        run: |
          gh workflow run model-release.yml
          echo "Triggered model-release.yml for new HF revision"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create model-update issue
        if: steps.version-check.outputs.changed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const sha = '${{ steps.version-check.outputs.sha }}';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['model-update'],
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `New TimesFM model version detected on HuggingFace (rev ${sha})`,
                body: [
                  `A new version of google/timesfm-2.5-200m-pytorch has been detected.`,
                  '',
                  `**HF revision:** ${sha}`,
                  '',
                  'Model release workflow has been triggered automatically.',
                  'A new model release will be created after validation.',
                  'The model-latest channel will be updated.',
                ].join('\n'),
                labels: ['model-update'],
              });
            }
