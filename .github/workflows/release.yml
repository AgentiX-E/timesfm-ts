name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  # ─── Publish npm packages ──────────────────────────────────────────────
  publish-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:unit || true
      - run: |
          pnpm -r --filter './packages/*' publish \
            --access public \
            --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Export and release ONNX model ────────────────────────────────────
  release-model:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export TimesFM 2.5 ONNX model
        run: |
          pip install "timesfm[torch]" onnx onnxruntime torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx
        timeout-minutes: 15

      - name: Create GitHub Release with model asset
        run: |
          gh release create ${{ github.ref_name }} \
            models/timesfm-2.5.onnx \
            models/timesfm-2.5.onnx.meta.json \
            --title "TimesFM 2.5 200M ONNX — ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
