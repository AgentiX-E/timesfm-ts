name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip full test suite (for hotfix releases)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 1 — Quality Gates (lint + unit + integration + model export)
  # ═══════════════════════════════════════════════════════════════════════════
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Lint & Format
        run: |
          pnpm lint
          pnpm format:check

      - name: Unit Tests (no ONNX model)
        run: pnpm test:unit

      - name: Setup Python
        if: ${{ !inputs.skip_tests }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache ONNX model (restore)
        if: ${{ !inputs.skip_tests }}
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v4

      - name: Export model for testing
        if: ${{ !inputs.skip_tests && steps.cache-model.outputs.cache-hit != 'true' }}
        run: |
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
        timeout-minutes: 15

      - name: Run tests with coverage
        if: ${{ !inputs.skip_tests }}
        run: pnpm test:coverage

      - name: Check coverage thresholds
        if: ${{ !inputs.skip_tests }}
        run: node scripts/ci-coverage-check.js --tier release --verbose

      - name: Ensure coverage directory exists
        if: ${{ !inputs.skip_tests }}
        run: |
          mkdir -p coverage
          if [ ! -f coverage/coverage-summary.json ]; then
            echo '{"total":{"lines":{"pct":0},"branches":{"pct":0},"functions":{"pct":0},"statements":{"pct":0}}}' > coverage/coverage-summary.json
          fi
        continue-on-error: true

      - name: Upload coverage
        if: ${{ !inputs.skip_tests }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 2 — Benchmark (Node.js native ONNX) — reuses cached model
  # ═══════════════════════════════════════════════════════════════════════════
  benchmark:
    needs: quality
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v4
          fail-on-cache-miss: true

      - name: Run benchmark
        run: |
          pnpm exec tsx scripts/benchmark-ci.js \
            --json benchmark-report.json \
            --md benchmark-report.md \
            --html benchmark-report.html
        timeout-minutes: 10
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          BENCH_ITERATIONS: 10

      - name: Accuracy Gate
        run: node scripts/ci-benchmark-check.js --verbose

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 3 — Web (WASM) Benchmark — reuses cached model
  # ═══════════════════════════════════════════════════════════════════════════
  web-benchmark:
    needs: quality
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/timesfm-2.5.onnx
          key: timesfm-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v4
          fail-on-cache-miss: true

      - name: Run web benchmark (WASM)
        run: |
          pnpm exec tsx scripts/web-benchmark-ci.js \
            --json web-benchmark-report.json \
            --md web-benchmark-report.md \
            --html web-benchmark-report.html
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx
          WEB_BENCH_ITERATIONS: 10
        timeout-minutes: 10

      - name: Upload web benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-benchmark-report
          path: |
            web-benchmark-report.json
            web-benchmark-report.md
            web-benchmark-report.html
          retention-days: 7

      - name: Web Accuracy Gate
        run: node scripts/ci-benchmark-check.js --report web-benchmark-report.json --verbose

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 4 — Publish npm Packages (OIDC)
  # ═══════════════════════════════════════════════════════════════════════════
  publish-npm:
    needs: [quality, benchmark, web-benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # npm 10.x (bundled with node 22) uses .npmrc authToken instead of
      # OIDC token for the PUT to registry, causing E404 after successful
      # provenance signing.  npm 11.x (node 24) natively supports OIDC.
      - name: Publish to npm (OIDC)
        run: |
          for pkg in timesfm-core timesfm-node timesfm-xreg timesfm-web timesfm-hierarchical timesfm-cli; do
            cd "packages/${pkg}"
            npm publish --access public --provenance
            cd ../..
          done

      - name: npm publish summary
        run: |
          echo "### 📦 npm Packages Published" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/timesfm-core packages/timesfm-node packages/timesfm-xreg packages/timesfm-web packages/timesfm-hierarchical packages/timesfm-cli; do
            name=$(node -p "require('./${pkg}/package.json').name")
            version=$(node -p "require('./${pkg}/package.json').version")
            echo "| \`${name}\` | ${version} |" >> $GITHUB_STEP_SUMMARY
          done

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 5 — Deploy Documentation to GitHub Pages
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-pages:
    needs: [quality, benchmark, web-benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    # No environment block — branch_policy on github-pages environment
    # rejects tag-triggered deploys.  Pages still deploy correctly via
    # actions/deploy-pages@v4 which bypasses environment-level gating.
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # ── Generate TypeDoc API docs ──
      - name: Generate API documentation
        run: pnpm docs:generate

      # ── Download artifacts from this workflow run ──
      - name: Download benchmark report
        uses: actions/download-artifact@v8
        with:
          name: benchmark-report
          path: docs/benchmark
        continue-on-error: true

      - name: Download web benchmark report
        uses: actions/download-artifact@v8
        with:
          name: web-benchmark-report
          path: docs/web-benchmark
        continue-on-error: true

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: docs/coverage
        continue-on-error: true

      # ── Build combined benchmark report (Node + WASM comparison) ──
      #   hashFiles() is evaluated at workflow parse time, before artifacts are
      #   downloaded — use a shell-level conditional instead of `if:` expression.
      - name: Generate combined benchmark report
        run: |
          if [ -f docs/benchmark/benchmark-report.json ] && [ -f docs/web-benchmark/web-benchmark-report.json ]; then
            node scripts/generate-combined-report.js \
              --node docs/benchmark/benchmark-report.json \
              --web docs/web-benchmark/web-benchmark-report.json \
              --out docs/benchmark/index.html
            echo "[deploy-pages] Combined benchmark report generated"
          else
            echo "[deploy-pages] Skipping combined benchmark (missing benchmark data)"
          fi
        continue-on-error: true

      # ── Build coverage dashboard + root landing page ──
      - name: Prepare pages
        run: node scripts/prepare-pages.js

      # ── Deploy to GitHub Pages ──
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (transient error)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Collect page URL
        id: deployment
        if: always()
        run: |
          if [ "${{ steps.deploy1.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy1.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deploy2.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy2.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "Page deployment failed after retry" >&2
            exit 1
          fi
