name: Model Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-release even if already published'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      hf_sha: ${{ steps.detect.outputs.hf_sha }}
      model_tag: ${{ steps.detect.outputs.model_tag }}
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Detect if new HF revision
        id: detect
        run: |
          SHA=$(python3 -c "
          import requests, json
          r = requests.get('https://huggingface.co/api/models/google/timesfm-2.5-200m-pytorch', timeout=10)
          print(json.loads(r.text)['sha'][:12])
          ")

          MODEL_TAG="timesfm-2.5"
          echo "hf_sha=${SHA}" >> $GITHUB_OUTPUT
          echo "model_tag=${MODEL_TAG}" >> $GITHUB_OUTPUT

          # Compare against committed descriptor
          STORED=$(python3 -c "
          import json
          try:
            with open('models/model-descriptor.json') as f:
              d = json.load(f)
            print(d.get('model',{}).get('hf_revision',''))
          except: print('')
          ")

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Force release requested"
          elif [ "$SHA" = "$STORED" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "HF revision unchanged (${SHA}) — skipping"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "New HF revision: ${SHA} (was: ${STORED})"
          fi

  export:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
      - name: Export TimesFM 2.5 → ONNX
        run: |
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx
      - name: Package as zip
        run: |
          cd models
          zip "timesfm-onnx-2.5.zip" \
            timesfm-2.5.onnx \
            model-descriptor.json
          SHA256=$(sha256sum "timesfm-onnx-2.5.zip" | cut -d' ' -f1)
          echo "zip_sha256=${SHA256}" >> $GITHUB_OUTPUT
        id: checksum
      - uses: actions/upload-artifact@v4
        with:
          name: model-zip
          path: models/timesfm-onnx-2.5.zip
          retention-days: 1

  validate:
    needs: export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Download and extract model
        run: |
          mkdir -p models
          # We need the actual ONNX for tests — export it (or use cached)
          pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx \
            --skip-validation
      - name: Install & build
        run: pnpm config set approve-builds true 2>/dev/null || true; pnpm install --frozen-lockfile && pnpm build
      - name: Run integration tests
        run: pnpm test
        env:
          TIMESFM_TEST_MODEL: models/timesfm-2.5.onnx
      - name: Run benchmark
        run: pnpm run benchmark
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx

  release:
    needs: [check, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: model-zip
          path: release-assets/
      - name: Create GitHub Release
        run: |
          MODEL_TAG="${{ needs.check.outputs.model_tag }}"
          SHA="${{ needs.check.outputs.hf_sha }}"

          # Delete existing release for this model version (update-in-place)
          gh release delete "${MODEL_TAG}" --yes 2>/dev/null || true
          git tag -f "${MODEL_TAG}"
          git push -f origin "${MODEL_TAG}"

          gh release create "${MODEL_TAG}" \
            release-assets/timesfm-onnx-2.5.zip \
            --title "TimesFM 2.5 200M ONNX Model" \
            --notes "Pre-exported TimesFM 2.5 200M ONNX model.

          **HF revision:** \`${SHA}\`

          ### Asset
          - \`timesfm-onnx-2.5.zip\` — Contains \`timesfm-2.5.onnx\` + \`model-descriptor.json\`

          ### Usage
          \`\`\`bash
          npx @agentix-e/timesfm-cli setup
          \`\`\`"

          # Update rolling latest pointer
          gh release delete timesfm-latest --yes 2>/dev/null || true
          git tag -f timesfm-latest
          git push -f origin timesfm-latest
          gh release create timesfm-latest \
            release-assets/timesfm-onnx-2.5.zip \
            --title "TimesFM ONNX — Latest" \
            --notes "Rolling pointer to the latest validated TimesFM ONNX model.

          **Current HF revision:** \`${SHA}\`
          **Model tag:** \`${MODEL_TAG}\`

          This release is automatically updated when a new model version is detected."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commit-descriptor:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: model-zip
          path: models/
      - name: Extract and commit descriptor
        run: |
          cd models
          unzip -o timesfm-onnx-2.5.zip model-descriptor.json
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/model-descriptor.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(model): update descriptor (HF rev ${{ needs.check.outputs.hf_sha }})"
            git push
          fi
