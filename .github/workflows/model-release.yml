name: Model Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-release even if already published'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      hf_sha: ${{ steps.detect.outputs.hf_sha }}
      model_tag: ${{ steps.detect.outputs.model_tag }}
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Detect if new HF revision
        id: detect
        run: |
          SHA=$(python3 -c "
          import requests, json
          r = requests.get('https://huggingface.co/api/models/google/timesfm-2.5-200m-pytorch', timeout=10)
          print(json.loads(r.text)['sha'][:12])
          ")

          MODEL_TAG="timesfm-2.5"
          echo "hf_sha=${SHA}" >> $GITHUB_OUTPUT
          echo "model_tag=${MODEL_TAG}" >> $GITHUB_OUTPUT

          # Compare against committed descriptor
          STORED=$(python3 -c "
          import json
          try:
            with open('models/model-descriptor.json') as f:
              d = json.load(f)
            print(d.get('model',{}).get('hf_revision',''))
          except: print('')
          ")

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Force release requested"
          elif [ "$SHA" = "$STORED" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "HF revision unchanged (${SHA}) — skipping"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "New HF revision: ${SHA} (was: ${STORED})"
          fi

  export:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install "timesfm[torch]" onnx onnxruntime onnxscript torch
      - name: Export TimesFM 2.5 → ONNX
        run: |
          python3 scripts/export-onnx.py \
            --model google/timesfm-2.5-200m-pytorch \
            --output models/timesfm-2.5.onnx
      - name: Package as zip
        run: |
          cd models
          zip "timesfm-onnx-2.5.zip" \
            timesfm-2.5.onnx \
            model-descriptor.json
          SHA256=$(sha256sum "timesfm-onnx-2.5.zip" | cut -d' ' -f1)
          echo "zip_sha256=${SHA256}" >> $GITHUB_OUTPUT
        id: checksum
      - uses: actions/upload-artifact@v7
        with:
          name: model-zip
          path: models/timesfm-onnx-2.5.zip
          retention-days: 1

  validate:
    needs: export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Download model artifact
        uses: actions/download-artifact@v8
        with:
          name: model-zip
          path: models/
      - name: Extract model
        run: |
          cd models
          unzip -o timesfm-onnx-2.5.zip
          ls -lh timesfm-2.5.onnx
      - name: Install & build
        run: pnpm config set approve-builds true 2>/dev/null || true; pnpm install --frozen-lockfile && pnpm build
      - name: Run integration tests
        run: pnpm test
        env:
          TIMESFM_TEST_MODEL: models/timesfm-2.5.onnx
      - name: Run benchmark
        run: pnpm run benchmark
        env:
          TIMESFM_MODEL_PATH: models/timesfm-2.5.onnx

  release:
    needs: [check, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: model-zip
          path: release-assets/
      - name: Create GitHub Release
        run: |
          MODEL_TAG="${{ needs.check.outputs.model_tag }}"
          SHA="${{ needs.check.outputs.hf_sha }}"

          # Create a unique release tag: timesfm-2.5-<hf_revision_short>
          # This avoids force-push on protected branches and keeps every
          # model release with a permanent, traceable tag.
          RELEASE_TAG="${MODEL_TAG}-${SHA}"
          gh release create "${RELEASE_TAG}" \
            release-assets/timesfm-onnx-2.5.zip \
            --title "TimesFM 2.5 200M ONNX Model (rev ${SHA})" \
            --notes "Pre-exported TimesFM 2.5 200M ONNX model.

          **HF revision:** \`${SHA}\`

          ### Asset
          - \`timesfm-onnx-2.5.zip\` — Contains \`timesfm-2.5.onnx\` + \`model-descriptor.json\`

          ### Usage
          \`\`\`bash
          npx @agentix-e/timesfm-cli setup
          \`\`\`"

          # Update rolling latest pointer — upload new asset to existing release
          # without force-pushing git tags (safe on protected branches).
          if gh release view timesfm-latest &>/dev/null; then
            gh release upload timesfm-latest \
              release-assets/timesfm-onnx-2.5.zip --clobber
            # Update release notes via gh api to avoid re-creating the tag
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/releases/tags/timesfm-latest" \
              -f tag_name='timesfm-latest' \
              -f name='TimesFM ONNX — Latest' \
              -f body="Rolling pointer to the latest validated TimesFM ONNX model.

          **Current HF revision:** \`${SHA}\`
          **Model tag:** \`${RELEASE_TAG}\`

          This release is automatically updated when a new model version is detected." \
              -f prerelease=false
          else
            gh release create timesfm-latest \
              release-assets/timesfm-onnx-2.5.zip \
              --title "TimesFM ONNX — Latest" \
              --notes "Rolling pointer to the latest validated TimesFM ONNX model.

          **Current HF revision:** \`${SHA}\`
          **Model tag:** \`${RELEASE_TAG}\`

          This release is automatically updated when a new model version is detected." \
              --latest=false
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commit-descriptor:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: model-zip
          path: models/
      - name: Extract and create PR for descriptor update
        run: |
          SHA="${{ needs.check.outputs.hf_sha }}"
          BRANCH_NAME="auto/model-descriptor-update-${SHA}"

          cd models
          unzip -o timesfm-onnx-2.5.zip model-descriptor.json
          cd ..

          # Check if descriptor has changed
          if git diff --quiet models/model-descriptor.json; then
            echo "No changes to model-descriptor.json — skipping"
            exit 0
          fi

          # Create a new branch for the PR
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH_NAME}"
          git add models/model-descriptor.json
          git commit -m "chore(model): update descriptor (HF rev ${SHA})

          Auto-generated by model-release workflow.
          New HF revision detected: ${SHA}"

          # Push the branch
          git push origin "${BRANCH_NAME}"

          # Create a PR using gh CLI
          gh pr create \
            --title "chore(model): update model descriptor (HF rev ${SHA})" \
            --body "Automated PR created by model-release workflow.

          **HF revision:** \`${SHA}\`

          This PR updates \`models/model-descriptor.json\` to the latest version detected from HuggingFace.

          Label: \`model-update\`" \
            --label "model-update" \
            --base master \
            --head "${BRANCH_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
